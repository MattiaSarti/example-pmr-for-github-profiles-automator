profiles:
- name: profile-without-contributors
  owner:
    kind: User
    name: identity-a@example.com
- name: profile-with-contributors
  owner:
    kind: User
    name: identity-b@example.com
  contributors:
  - name: identity-a@example.com
    role: edit
  - name: whatever-user-who-can-also-edit@example.com
    role: edit
  - name: whatever-user-who-can-only-view@example.com
    role: view
